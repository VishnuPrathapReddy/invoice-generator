<div
    class="min-h-screen bg-slate-50 dark:bg-slate-950 flex flex-col justify-center py-12 sm:px-6 lg:px-8 font-display relative overflow-hidden transition-colors duration-200">

    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[1000px] h-[500px] opacity-20 pointer-events-none">
        <div class="absolute inset-0 bg-gradient-to-r from-primary/30 to-emerald-500/30 blur-3xl rounded-full"></div>
    </div>

    <div class="sm:mx-auto sm:w-full sm:max-w-md relative z-10">
        <div class="flex justify-center mb-6">
            <div
                class="size-16 bg-primary rounded-2xl flex items-center justify-center shadow-lg shadow-primary/30 text-white">
                <span class="material-symbols-outlined text-3xl">how_to_reg</span>
            </div>
        </div>

        <h2 class="mt-2 text-center text-3xl font-black text-slate-900 dark:text-white tracking-tight">
            Create Account
        </h2>
        <p class="mt-2 text-center text-sm text-slate-500 dark:text-slate-400">
            Start managing beautiful invoices effortlessly.
        </p>

        <!-- Dark Mode Toggle -->
        <button (click)="toggleDarkMode()"
            class="absolute -top-4 right-4 sm:right-0 p-2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 bg-white dark:bg-slate-800 rounded-full shadow-sm border border-slate-200 dark:border-slate-700 transition-colors">
            <span class="material-symbols-outlined text-sm">
                {{ darkMode ? 'light_mode' : 'dark_mode' }}
            </span>
        </button>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md relative z-10 transition-all">
        <div
            class="bg-white dark:bg-slate-900 py-8 px-4 shadow-xl shadow-slate-200/50 dark:shadow-black/50 sm:rounded-2xl sm:px-10 border border-slate-100 dark:border-slate-800">

            <div *ngIf="errorMessage"
                class="mb-6 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg p-4 flex gap-3 text-red-700 dark:text-red-400">
                <span class="material-symbols-outlined">error</span>
                <p class="text-sm font-medium">{{ errorMessage }}</p>
            </div>

            <form class="space-y-5" (ngSubmit)="onSubmit()">
                <div>
                    <label for="name" class="block text-sm font-bold text-slate-700 dark:text-slate-300">
                        Full Name
                    </label>
                    <div class="mt-1.5 relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-slate-400 text-lg">person</span>
                        </div>
                        <input id="name" name="name" type="text" autocomplete="name" required [(ngModel)]="name"
                            class="appearance-none block w-full pl-10 pr-3 py-2.5 border border-slate-300 dark:border-slate-700 rounded-xl shadow-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 transition-colors">
                    </div>
                </div>

                <div>
                    <label for="email" class="block text-sm font-bold text-slate-700 dark:text-slate-300">
                        Email address
                    </label>
                    <div class="mt-1.5 relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-slate-400 text-lg">mail</span>
                        </div>
                        <input id="email" name="email" type="email" autocomplete="email" required [(ngModel)]="email"
                            class="appearance-none block w-full pl-10 pr-3 py-2.5 border border-slate-300 dark:border-slate-700 rounded-xl shadow-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 transition-colors">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-bold text-slate-700 dark:text-slate-300">
                        Password
                    </label>
                    <div class="mt-1.5 relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-slate-400 text-lg">lock</span>
                        </div>
                        <input id="password" name="password" type="password" autocomplete="new-password" required
                            [(ngModel)]="password"
                            class="appearance-none block w-full pl-10 pr-3 py-2.5 border border-slate-300 dark:border-slate-700 rounded-xl shadow-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 transition-colors">
                    </div>
                </div>

                <div>
                    <button type="submit" [disabled]="isLoading"
                        class="w-full mt-2 flex justify-center py-2.5 px-4 border border-transparent rounded-xl shadow-sm text-sm font-bold text-white bg-primary hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary disabled:opacity-70 disabled:cursor-not-allowed transition-all">
                        <span *ngIf="isLoading"
                            class="material-symbols-outlined animate-spin mr-2">progress_activity</span>
                        Register
                    </button>
                </div>
            </form>

            <div class="mt-6">
                <div class="relative">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-slate-200 dark:border-slate-700"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white dark:bg-slate-900 text-slate-500 font-medium">
                            Already have an account?
                        </span>
                    </div>
                </div>

                <div class="mt-6">
                    <a routerLink="/login"
                        class="w-full flex justify-center py-2.5 px-4 border border-slate-300 dark:border-slate-600 rounded-xl shadow-sm text-sm font-bold text-slate-700 dark:text-slate-200 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
                        Sign in instead
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
